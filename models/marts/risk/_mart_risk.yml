version: 2

models:
  - name: mart_loan_risk_dashboard
    description: "Loan portfolio risk dashboard — provisions, delinquency, payment status"
    columns:
      - name: loan_id
        data_tests:
          - unique
          - not_null
      - name: provision_rate
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
      - name: provision_amount_xof
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: payment_status
        data_tests:
          - not_null
          - accepted_values:
              values: ['current', 'overdue', 'defaulted', 'first_payment_missed']
      - name: repayment_ratio_pct
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 120"
