name: 'dbt_testing_quality'
version: '1.0.0'
config-version: 2

profile: 'dbt_testing_quality'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
docs-paths: ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Data quality thresholds
  max_null_ratio: 0.05           # Max 5% nulls allowed
  min_row_count: 100             # Minimum expected row count
  max_freshness_hours: 24        # Max data freshness in hours
  anomaly_threshold: 3.0         # Standard deviations for anomaly detection

models:
  dbt_testing_quality:
    staging:
      +materialized: view
      +tags: ["staging"]
    intermediate:
      +materialized: table
      +tags: ["intermediate"]
    marts:
      credit:
        +materialized: table
        +tags: ["marts", "credit"]
      risk:
        +materialized: table
        +tags: ["marts", "risk"]

seeds:
  dbt_testing_quality:
    +schema: raw
    +quote_columns: false
